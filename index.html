<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>វិញ្ញាសា QCM អនឡាញ ប្រមូលពិន្ទុស្វ័យប្រវត្ត</title>
    <style>
        body {
            font-family: 'Khmer OS Siemreap', 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            padding: 30px;
        }
        .quiz-container {
            max-width: 750px;
            background: white;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            font-family: 'Khmer OS Muol Light', sans-serif;
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 25px;
        }
        .student-info {
            background-color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .student-info input {
            padding: 8px;
            font-family: 'Khmer OS Siemreap', sans-serif;
            margin-right: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 14px;
        }
        .question-block {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 6px;
            background-color: #f8fafc;
            border-left: 4px solid #2563eb;
        }
        .question { font-weight: bold; color: #333; font-size: 16px; }
        .answers { margin-top: 10px; padding-left: 15px; }
        .answers label { display: block; margin: 10px 0; cursor: pointer; }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #10b981; /* ពណ៌បៃតងសម្រាប់ផ្ញើទិន្នន័យ */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'Khmer OS Siemreap', sans-serif;
            font-weight: bold;
        }
        .btn-submit:hover { background-color: #059669; }
        #result {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #1e3a8a;
        }
    </style>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<div class="quiz-container">
    <h2>វិញ្ញាសាប្រឡងគណិតវិទ្យាអនឡាញ</h2>
    
    <div class="student-info">
        <label>ឈ្មោះសិស្ស៖ </label>
        <input type="text" id="studentName" placeholder="ឧទាហរណ៍៖ កែវ មុន្នី" required>
        <label>ថ្នាក់៖ </label>
        <input type="text" id="studentClass" placeholder="ឧទាហរណ៍៖ ១២គ" required>
    </div>
    
    <form id="quizForm">
        <div class="question-block">
            <div class="question">សំណួរទី ១: គណនាលីមីត $\lim_{x \to 0} \frac{\sin x}{x}$</div>
            <div class="answers">
                <label><input type="radio" name="q1" value="A"> A. $0$</label>
                <label><input type="radio" name="q1" value="B"> B. $1$</label>
                <label><input type="radio" name="q1" value="C"> C. $\infty$</label>
            </div>
        </div>

        <div class="question-block">
            <div class="question">សំណួរទី ២: បើ $z = 1 + i$ តើទម្រង់ត្រីកោណមាត្រនៃ $z$ គឺ៖</div>
            <div class="answers">
                <label><input type="radio" name="q2" value="A"> A. $\sqrt{2}\left(\cos\frac{\pi}{4} + i\sin\frac{\pi}{4}\right)$</label>
                <label><input type="radio" name="q2" value="B"> B. $2\left(\cos\frac{\pi}{4} + i\sin\frac{\pi}{4}\right)$</label>
                <label><input type="radio" name="q2" value="C"> C. $\sqrt{2}\left(\cos\frac{\pi}{2} + i\sin\frac{\pi}{2}\right)$</label>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="submitExam()">បញ្ជូនកិច្ចការ និងរក្សាទុកពិន្ទុ</button>
    </form>

    <div id="result"></div>
</div>

<script>
    // 🔗 សូមយក Web App URL ពីជំហានទី១ មកដាក់ជំនួសកន្លែងនេះ
    const WEB_APP_URL = https://script.google.com/macros/s/AKfycbx_E4AnEOWzKyMYMpgQdUpd6M_gt6actpPc-dC2mG9pV-c65EUq00Kih3pfZI75wbKyMQ/exec;

    function submitExam() {
        const name = document.getElementById('studentName').value.trim();
        const studentClass = document.getElementById('studentClass').value.trim();
        
        // ពិនិត្យថាសិស្សបានបំពេញឈ្មោះ និងថ្នាក់ហើយឬនៅ
        if (name === "" || studentClass === "") {
            alert("សូមបំពេញឈ្មោះ និងថ្នាក់របស់ប្អូនមុននឹងបញ្ជូនកិច្ចការ!");
            return;
        }

        const correctAnswers = { q1: "B", q2: "A" };
        let score = 0;
        const totalQuestions = 2;
        const form = document.getElementById('quizForm');
        
        // គណនាពិន្ទុ
        if (form.elements['q1'].value === correctAnswers.q1) score++;
        if (form.elements['q2'].value === correctAnswers.q2) score++;

        document.getElementById('result').innerHTML = "កំពុងបញ្ជូនទិន្នន័យ... សូមរង់ចាំមួយភ្លែត!";

        // 📦 ខ្ចប់ទិន្នន័យផ្ញើទៅ Google Sheet តាមរយៈ API (fetch)
        const payload = {
            name: name,
            studentClass: studentClass,
            score: `${score} / ${totalQuestions}`
        };

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors", // កំណត់ដើម្បីកុំឱ្យជាប់បញ្ហា CORS Block របស់ Browser
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            document.getElementById('result').innerHTML = `ការបញ្ជូនជោគជ័យ! លទ្ធផលរបស់ ${name} គឺ៖ ${score} / ${totalQuestions}`;
            alert("ពិន្ទុរបស់ប្អូនត្រូវបានរក្សាទុកក្នុងប្រព័ន្ធរួចរាល់ហើយ!");
        })
        .catch(error => {
            console.error("Error:", error);
            document.getElementById('result').innerHTML = "មានបញ្ហាក្នុងការផ្ញើទិន្នន័យ! សូមព្យាយាមម្ដងទៀត។";
        });
    }
</script>

</body>
</html>
